<svg width="260" height="260" viewBox="0 0 260 260" opacity="0.1" xmlns="http://www.w3.org/2000/svg">
<g fill="black" stroke="black">
	<!-- Chip body outline -->
	<rect x="58" y="58" width="144" height="144" rx="22" fill="none" stroke-width="8"/>
	<!-- Connection pins - top -->
	<rect x="98" y="28" width="8" height="30" rx="4" stroke="none"/>
	<rect x="154" y="28" width="8" height="30" rx="4" stroke="none"/>
	<!-- Connection pins - bottom -->
	<rect x="98" y="202" width="8" height="30" rx="4" stroke="none"/>
	<rect x="154" y="202" width="8" height="30" rx="4" stroke="none"/>
	<!-- Connection pins - left -->
	<rect x="28" y="98" width="30" height="8" rx="4" stroke="none"/>
	<rect x="28" y="154" width="30" height="8" rx="4" stroke="none"/>
	<!-- Connection pins - right -->
	<rect x="202" y="98" width="30" height="8" rx="4" stroke="none"/>
	<rect x="202" y="154" width="30" height="8" rx="4" stroke="none"/>
	<!-- X pattern inside chip -->
	<line x1="90" y1="90" x2="170" y2="170" stroke-width="9" stroke-linecap="round" fill="none"/>
	<line x1="170" y1="90" x2="90" y2="170" stroke-width="9" stroke-linecap="round" fill="none"/>
	<!-- Central AI core -->
	<circle cx="130" cy="130" r="15" stroke="none"/>
	<!-- Corner accent nodes -->
	<circle cx="90" cy="90" r="6" stroke="none"/>
	<circle cx="170" cy="90" r="6" stroke="none"/>
	<circle cx="90" cy="170" r="6" stroke="none"/>
	<circle cx="170" cy="170" r="6" stroke="none"/>
</g>
</svg>
